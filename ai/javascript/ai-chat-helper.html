<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Demo - Brent's AI Tool</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background-color: #f4f7fa;
            color: #333;
        }
        h1, h2 {
            color: #2c3e50;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        img {
            width: 250px;
            border-radius: 12px;
            margin: 20px 0;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        ul {
            list-style-type: none;
            padding: 0;
        }
        li {
            background: #ecf0f1;
            margin: 10px 0;
            padding: 12px;
            border-radius: 8px;
            font-size: 1.1em;
        }
        button {
            background: #3498db;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 1.1em;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
        }
        button:hover {
            background: #2980b9;
        }
        #features-list {
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 id="app-title">Welcome to My App</h1>
        
        <!-- Image as requested -->
        <img src="img/brent.jpg" alt="Brent" />

        <p id="greeting"></p>

        <h2>Key Features</h2>
        <div id="features-list"></div>

        <button onclick="greetUser()">Greet Me</button>

        <h2>AI Tool Information</h2>
        <div id="ai-info"></div>
    </div>

    <script>
        // 1. Create a variable called appName
        const appName = "BrentAI Assistant";

        // Set the title dynamically
        document.getElementById("app-title").textContent = appName;

        // 2. Create a function called greetUser
        function greetUser() {
            const name = prompt("What is your name?");
            if (name) {
                document.getElementById("greeting").innerHTML = 
                    `<strong>Hello, ${name}!</strong> Welcome to <em>${appName}</em>! 🎉`;
            } else {
                document.getElementById("greeting").innerHTML = 
                    `<strong>Hello there!</strong> Welcome to <em>${appName}</em>! 🎉`;
            }
        }

        // 3. Create an array called features with at least 3 items
        const features = [
            "Smart AI Responses",
            "Real-time Data Processing",
            "Beautiful User Interface",
            "Easy JavaScript Integration"
        ];

        // 4. Use a loop to display each feature
        function displayFeatures() {
            const featuresList = document.getElementById("features-list");
            featuresList.innerHTML = "<ul></ul>";
            const ul = featuresList.querySelector("ul");

            for (let i = 0; i < features.length; i++) {
                const li = document.createElement("li");
                li.textContent = features[i];
                ul.appendChild(li);
            }
        }

        // Call the function to display features when page loads
        displayFeatures();

        // 5. Create an object called aiTool
        const aiTool = {
            name: "BrentAI",
            version: "1.0",
            description: "A powerful JavaScript demonstration tool",
            capabilities: ["Natural Language Processing", "Feature Display", "User Interaction"],
            isActive: true,
            launchDate: "2026"
        };

        // Display the aiTool object information
        function displayAITool() {
            const infoDiv = document.getElementById("ai-info");
            infoDiv.innerHTML = `
                <strong>Name:</strong> ${aiTool.name}<br>
                <strong>Version:</strong> ${aiTool.version}<br>
                <strong>Description:</strong> ${aiTool.description}<br>
                <strong>Capabilities:</strong> ${aiTool.capabilities.join(", ")}<br>
                <strong>Status:</strong> ${aiTool.isActive ? "Active" : "Inactive"}<br>
                <strong>Launch Date:</strong> ${aiTool.launchDate}
            `;
        }

        // Display AI Tool info on page load
        displayAITool();

        // Bonus: Auto-greet after 1 second
        setTimeout(() => {
            document.getElementById("greeting").innerHTML = 
                `Welcome to <strong>${appName}</strong>! Click the button to greet yourself.`;
        }, 1000);
    </script>
</body>
</html>
